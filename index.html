<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Elemental Clash - Attack Speed Edition</title>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; }
        canvas { border: 4px solid #333; background: radial-gradient(circle, #222 0%, #000 100%); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .ui { position: absolute; top: 30px; width: 900px; display: flex; justify-content: space-between; z-index: 5; }
        .hp-bar { width: 350px; height: 25px; background: #222; border: 2px solid #fff; position: relative; }
        .hp-inner { width: 100%; height: 100%; background: #e74c3c; transition: width 0.3s ease; }
        
        #victory-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.9); 
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 999; backdrop-filter: blur(8px);
        }
        .win-text { font-size: 80px; letter-spacing: 5px; margin: 0; }
        .restart-hint { margin-top: 30px; font-size: 20px; color: #888; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="ui">
        <div class="hp-bar"><div id="p1-hp-fill" class="hp-inner"></div></div>
        <div class="hp-bar"><div id="p2-hp-fill" class="hp-inner"></div></div>
    </div>

    <div id="victory-screen">
        <h1 class="win-text" id="winner-label">VICTORY</h1>
        <p class="restart-hint">PRESS [ R ] TO RESTART</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1024;
        canvas.height = 576;

        let isGameOver = false;
        let shakeTime = 0;

        // --- 核心設定：攻擊速度 ---
        const ATTACK_DURATION = 150; // 攻擊判定持續毫秒 (數值越小揮拳越快)
        const ATTACK_COOLDOWN = 400; // 兩次攻擊間的間隔毫秒 (數值越小攻速越快)

        class Sprite {
            constructor({ position, velocity, color, offset, flip = false }) {
                this.position = position;
                this.velocity = velocity;
                this.width = 60;
                this.height = 140;
                this.color = color;
                this.health = 100;
                this.isAttacking = false;
                this.canAttack = true; // 是否可以攻擊 (冷卻控制)
                this.flip = flip;
                this.attackBox = { position: { x: this.position.x, y: this.position.y }, offset, width: 140, height: 50 };
            }

            draw() {
                ctx.save();
                // 陰影
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.beginPath();
                ctx.ellipse(this.position.x + this.width/2, canvas.height - 55, 40, 10, 0, 0, Math.PI * 2);
                ctx.fill();

                // 身體
                ctx.fillStyle = this.isDefending ? '#fff' : this.color;
                ctx.fillRect(this.position.x, this.position.y, this.width, this.height);
                
                // 頭與眼睛
                ctx.fillStyle = '#fff';
                ctx.fillRect(this.position.x + 10, this.position.y - 45, 40, 40);
                ctx.fillStyle = '#000';
                const eyeX = this.flip ? this.position.x + 15 : this.position.x + 35;
                ctx.fillRect(eyeX, this.position.y - 35, 8, 8);

                // 攻擊特效 (視覺化攻擊速度)
                if (this.isAttacking) {
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = 0.4;
                    ctx.fillRect(this.attackBox.position.x, this.attackBox.position.y, this.attackBox.width, this.attackBox.height);
                    ctx.globalAlpha = 1.0;
                }
                ctx.restore();
            }

            update() {
                this.draw();
                this.attackBox.position.x = this.position.x + this.attackBox.offset.x;
                this.attackBox.position.y = this.position.y + 30;

                this.position.x += this.velocity.x;
                this.position.y += this.velocity.y;

                // 牆壁限制
                if (this.position.x <= 0) this.position.x = 0;
                if (this.position.x + this.width >= canvas.width) this.position.x = canvas.width - this.width;

                // 重力
                if (this.position.y + this.height + this.velocity.y >= canvas.height - 60) {
                    this.velocity.y = 0;
                    this.position.y = canvas.height - 60 - this.height;
                } else {
                    this.velocity.y += 0.8;
                }
            }

            // 執行攻擊邏輯
            performAttack() {
                if (!this.canAttack || isGameOver) return;

                this.isAttacking = true;
                this.canAttack = false;

                // 1. 攻擊判定持續時間
                setTimeout(() => {
                    this.isAttacking = false;
                }, ATTACK_DURATION);

                // 2. 攻擊冷卻時間 (決定攻速)
                setTimeout(() => {
                    this.canAttack = true;
                }, ATTACK_COOLDOWN);
            }
        }

        const p1 = new Sprite({ position: { x: 100, y: 0 }, velocity: { x: 0, y: 0 }, color: '#3498db', offset: { x: 0, y: 0 }, flip: false });
        const p2 = new Sprite({ position: { x: 864, y: 0 }, velocity: { x: 0, y: 0 }, color: '#e74c3c', offset: { x: -80, y: 0 }, flip: true });

        const keys = { a: false, d: false, w: false, s: false, ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false };

        function triggerEnd(winner) {
            isGameOver = true;
            shakeTime = 30;
            document.getElementById('winner-label').innerText = winner + " VICTORY";
            document.getElementById('winner-label').style.color = (winner === 'PLAYER 1') ? '#3498db' : '#e74c3c';
            setTimeout(() => { document.getElementById('victory-screen').style.display = 'flex'; }, 600);
        }

        function animate() {
            if (shakeTime > 0) {
                const dx = Math.random() * 12 - 6;
                const dy = Math.random() * 12 - 6;
                ctx.setTransform(1, 0, 0, 1, dx, dy);
                shakeTime--;
            } else {
                ctx.setTransform(1, 0, 0, 1, 0, 0);
            }

            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#333';
            ctx.fillRect(0, canvas.height - 60, canvas.width, 60);

            p1.update();
            p2.update();

            p1.velocity.x = 0;
            p2.velocity.x = 0;

            if (!isGameOver) {
                if (keys.a) p1.velocity.x = -8; else if (keys.d) p1.velocity.x = 8;
                if (keys.ArrowLeft) p2.velocity.x = -8; else if (keys.ArrowRight) p2.velocity.x = 8;
                p1.isDefending = keys.s;
                p2.isDefending = keys.ArrowDown;

                // 碰撞判定 (只有在 isAttacking 為 true 時計算)
                if (p1.isAttacking && 
                    p1.attackBox.position.x + p1.attackBox.width >= p2.position.x &&
                    p1.attackBox.position.x <= p2.position.x + p2.width &&
                    p1.attackBox.position.y + p1.attackBox.height >= p2.position.y &&
                    p1.attackBox.position.y <= p2.position.y + p2.height) {
                    p1.isAttacking = false; // 命中後立即取消判定，防止單次攻擊多次傷害
                    if (!p2.isDefending) {
                        p2.health -= 10;
                        document.getElementById('p2-hp-fill').style.width = Math.max(0, p2.health) + '%';
                        if (p2.health <= 0) triggerEnd('PLAYER 1');
                    }
                }

                if (p2.isAttacking && 
                    p2.attackBox.position.x + p2.attackBox.width >= p1.position.x &&
                    p2.attackBox.position.x <= p1.position.x + p1.width &&
                    p2.attackBox.position.y + p2.attackBox.height >= p1.position.y &&
                    p2.attackBox.position.y <= p1.position.y + p1.height) {
                    p2.isAttacking = false;
                    if (!p1.isDefending) {
                        p1.health -= 10;
                        document.getElementById('p1-hp-fill').style.width = Math.max(0, p1.health) + '%';
                        if (p1.health <= 0) triggerEnd('PLAYER 2');
                    }
                }
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') location.reload();
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
            if (e.key === 'w' && p1.velocity.y === 0) p1.velocity.y = -20;
            if (e.key === 'ArrowUp' && p2.velocity.y === 0) p2.velocity.y = -20;
            if (e.key === ' ') p1.performAttack();
            if (e.key === 'Enter') p2.performAttack();
        });

        window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        animate();
    </script>
</body>
</html>
